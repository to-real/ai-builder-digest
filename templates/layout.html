<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<meta name="description" content="{{description}}">
<link rel="alternate" type="application/rss+xml" title="AI Builders Digest" href="feed.xml">
<style>
{{style}}
</style>
</head>
<body>
<header class="site-head">
  <div class="wrap">
    <a class="brand" href="index.html"><span class="brand-mark">·</span> AI Builders Daily</a>
    <nav><a href="archive.html">归档</a> · <a href="about.html">关于</a></nav>
  </div>
</header>
<div class="lang-toggle">
  <button data-lang="both" class="active">双语</button>
  <button data-lang="zh">中文</button>
  <button data-lang="en">EN</button>
</div>
<main class="wrap">
{{main}}
</main>
<footer class="site-foot">
  <div class="wrap">
    每日自动生成 · 数据来自 <a href="https://github.com/zarazhangrui/follow-builders">follow-builders</a> · 双语对照
  </div>
</footer>
<script>
(function(){
  var t = document.querySelector('.lang-toggle');
  if(!t) return;
  function setLang(l){
    document.body.className = l==='en'?'lang-en':l==='zh'?'lang-zh':'';
    t.querySelectorAll('button').forEach(function(b){b.classList.toggle('active', b.dataset.lang===l);});
    localStorage.setItem('digest-lang', l);
  }
  t.querySelectorAll('button').forEach(function(b){b.addEventListener('click', function(){setLang(b.dataset.lang);});});
  setLang(localStorage.getItem('digest-lang') || 'both');
})();
</script>
<script>
document.querySelectorAll('.share').forEach(function(btn){
  btn.addEventListener('click', function(e){
    e.preventDefault();
    var base = location.href.split('#')[0];
    navigator.clipboard.writeText(base + '#' + btn.dataset.slug).then(function(){
      var orig = btn.textContent; btn.textContent = '✓';
      setTimeout(function(){ btn.textContent = orig; }, 1200);
    });
  });
});
function openSectionForHash(){
  if(!location.hash) return;
  var t = document.querySelector(location.hash);
  if(t){ var d = t.closest('.podcast-section'); if(d) d.open = true; }
}
openSectionForHash();
window.addEventListener('hashchange', openSectionForHash);
</script>
</body>
</html>
